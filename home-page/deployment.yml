apiVersion: apps/v1
kind: Deployment

metadata:
  name: home-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: home

  template:
    metadata:
      labels:
        app: home

    spec:
      containers:
      - name: home-container
        image: nginx

        ports:
        - containerPort: 80

        volumeMounts:
        - name: home-volume
          mountPath: /usr/share/nginx/html

      volumes:
      - name: home-volume
        configMap:
          name: home-html