apiVersion: apps/v1
kind: Deployment

metadata:
  name: shop-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shop

  template:
    metadata:
      labels:
        app: shop

    spec:
      containers:
      - name: shop-container
        image: nginx

        ports:
        - containerPort: 80

        volumeMounts:
        - name: shop-volume
          mountPath: /usr/share/nginx/html

      volumes:
      - name: shop-volume
        configMap:
          name: shop-html