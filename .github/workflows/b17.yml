name: Build and Push and Deploy to Kubernetes

on: push

jobs:
    buildandpush:
        runs-on: ubuntu-latest
        steps:
          - name: checkout code
            uses: actions/checkout@v6

          - name: Aws configure
            uses: aws-actions/configure-aws-credentials@v2
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ap-south-1

          - name: Login to Amazon ECR
            run: |
              aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin 415696284448.dkr.ecr.ap-south-1.amazonaws.com

          - name: Build and Push Docker Image
            run: |
              docker build -t 415696284448.dkr.ecr.ap-south-1.amazonaws.com/b17:latest .
              docker push 415696284448.dkr.ecr.ap-south-1.amazonaws.com/b17:latest

          - name: Set up kubectl
            uses: azure/setup-kubectl@v3
            with:
              version: 'latest'

          - name: Configure kubectl
            run: |
              aws eks update-kubeconfig --region ap-south-1 --name b17



          - name: Deploy to Kubernetes 2
            run: |
              kubectl apply -f k8s/deploy.yml
              kubectl apply -f k8s/service.yml



            




